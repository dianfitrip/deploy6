<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
<div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">MY Website <span th:text="${myNim}"></span></h1>
        <div class="flex items-center space-x-6">
            <a href="/profil" class="text-blue-500 font-medium hover:text-blue-700">Profil</a>
            <a href="/logout" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 font-medium">Logout</a>
        </div>
    </div>

    <p class="text-lg text-gray-700 mb-4">Selamat datang di aplikasi!</p>
    <a href="/form" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 inline-block mb-6 font-medium">Input Data Mahasiswa</a>

    <h2 class="text-xl font-semibold mb-4 text-gray-800">Data Mahasiswa</h2>
    <table class="w-full border-collapse border border-gray-300 text-left">
        <thead class="bg-gray-200">
        <tr>
            <th class="border border-gray-300 px-4 py-2">No</th>
            <th class="border border-gray-300 px-4 py-2">Nama</th>
            <th class="border border-gray-300 px-4 py-2">NIM</th>
            <th class="border border-gray-300 px-4 py-2">Jenis Kelamin</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(mahasiswas)}">
            <td colspan="4" class="border border-gray-300 px-4 py-2 text-center text-gray-500">Belum ada data</td>
        </tr>
        <tr th:each="mhs, stat : ${mahasiswas}">
            <td class="border border-gray-300 px-4 py-2" th:text="${stat.count}"></td>
            <td class="border border-gray-300 px-4 py-2" th:text="${mhs.nama}"></td>
            <td class="border border-gray-300 px-4 py-2" th:text="${mhs.nim}"></td>
            <td class="border border-gray-300 px-4 py-2" th:text="${mhs.jenisKelamin}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
