<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Input</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
<div class="max-w-lg mx-auto bg-white p-6 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">Form Input Mahasiswa</h2>
    <form action="/form" method="post" class="space-y-4">
        <div>
            <label class="block mb-1 font-semibold text-gray-700">Nama:</label>
            <input type="text" name="nama" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div>
            <label class="block mb-1 font-semibold text-gray-700">NIM:</label>
            <input type="text" name="nim" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div>
            <label class="block mb-1 font-semibold text-gray-700">Jenis Kelamin:</label>
            <div class="space-x-4 mt-2">
                <label class="inline-flex items-center"><input type="radio" name="jenisKelamin" value="Laki-laki" required class="mr-2"> Laki-laki</label>
                <label class="inline-flex items-center"><input type="radio" name="jenisKelamin" value="Perempuan" required class="mr-2"> Perempuan</label>
            </div>
        </div>
        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 font-semibold w-full mt-4">Submit</button>
    </form>
    <div class="mt-6 text-center">
        <a href="/home" class="text-blue-500 hover:text-blue-700 font-medium">Kembali ke Home</a>
    </div>
</div>
</body>
</html>
